services:
  postgres:
    # pgvector 포함 PostgreSQL 18 (RAG 용 vector 확장). 공식 postgres:18 기반(Debian).
    # 기존 alpine 데이터 볼륨에서 전환 시 glibc/musl collation 차이로 텍스트 인덱스가
    # 어긋날 수 있으니, 운영 데이터가 있다면 전환 후 `REINDEX DATABASE <db>` 를 권장.
    image: pgvector/pgvector:pg18
    container_name: stella-th-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stella}
      POSTGRES_USER: ${POSTGRES_USER:-stella}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stella_dev_pass}
    volumes:
      - postgres-data:/var/lib/postgresql/18/docker
    networks:
      - stella-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stella} -d ${POSTGRES_DB:-stella}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  app:
    image: charles1031/stella-th:1.1.0   # 업데이트 시 태그만 변경
    container_name: stella-th-app
    restart: unless-stopped
    ports:
      - "4100:4100"
      # 웹(프론트) 공개 포트 — 리버스 프록시가 가리키는 포트. 충돌 시 .env 의 TH_PORT 변경.
      # (좌측=호스트 공개 포트만 바뀜, 우측=컨테이너 내부는 3100 고정)
      - "${TH_PORT:-3100}:3100"
    env_file:
      - path: ./.env
        required: false
    environment:
      TH_HOST: ${TH_HOST}
      TH_ADMIN_EMAIL_ID: ${TH_ADMIN_EMAIL_ID}
      TH_ADMIN_PASSWORD: ${TH_ADMIN_PASSWORD:-changeme1234}
      DATABASE_URL: postgres://${POSTGRES_USER:-stella}:${POSTGRES_PASSWORD:-stella_dev_pass}@postgres:5432/${POSTGRES_DB:-stella}
      # AI 설정 seed (DB 의 'ai' row 가 비어있을 때만 시드, 이후 Settings 값 우선)
      # Reasoning / Vision 그룹을 각각 endpoint / API key / model / max output tokens 로 시드.
      #   (model·max tokens 는 선택. 비우면 Settings 에서 지정/기본값 사용)
      AI_REASONING_ENDPOINT: ${AI_REASONING_ENDPOINT}
      AI_REASONING_API_KEY: ${AI_REASONING_API_KEY}
      AI_REASONING_MODEL: ${AI_REASONING_MODEL}
      AI_REASONING_MAX_TOKENS: ${AI_REASONING_MAX_TOKENS}
      AI_VISION_ENDPOINT: ${AI_VISION_ENDPOINT}
      AI_VISION_API_KEY: ${AI_VISION_API_KEY}
      AI_VISION_MODEL: ${AI_VISION_MODEL}
      AI_VISION_MAX_TOKENS: ${AI_VISION_MAX_TOKENS}
      # 레거시(단일) 폴백 — 그룹 전용 endpoint/key 가 없으면 양쪽에 적용.
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_SECURE: ${SMTP_SECURE:-0}
      SEARCH_TOP_READ: ${SEARCH_TOP_READ:-3}
      HASHTAG_THRESHOLD_DEFAULT: ${HASHTAG_THRESHOLD_DEFAULT:-3}
      UPLOAD_DIR: /app/backend/uploads
      LOG_DIR: /app/backend/logs
    volumes:
      - attachments-data:/app/backend/uploads
      - logs-data:/app/backend/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stella-net
    healthcheck:
      test: ["CMD-SHELL", "(wget -q --spider http://127.0.0.1:4100/auth/setup-status && wget -q --spider http://127.0.0.1:3100/) || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

networks:
  stella-net:
    driver: bridge

volumes:
  postgres-data:
  attachments-data:
  logs-data:
