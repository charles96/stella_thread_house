services:
  postgres:
    image: postgres:18-alpine
    container_name: stella-th-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stella}
      POSTGRES_USER: ${POSTGRES_USER:-stella}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stella_dev_pass}
    volumes:
      - postgres-data:/var/lib/postgresql/18/docker
    networks:
      - stella-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stella} -d ${POSTGRES_DB:-stella}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  app:
    image: registry.webnori.com/stella-th:1.1.0
    container_name: stella-th-app
    restart: unless-stopped
    ports:
      - "4100:4100"
      - "3100:3100"
    env_file:
      - path: ./.env
        required: false
    environment:
      TH_HOST: ${TH_HOST:-http://localhost:3100}
      TH_ADMIN_EMAIL_ID: ${TH_ADMIN_EMAIL_ID}
      TH_ADMIN_PASSWORD: ${TH_ADMIN_PASSWORD:-changeme1234}
      DATABASE_URL: postgres://${POSTGRES_USER:-stella}:${POSTGRES_PASSWORD:-stella_dev_pass}@postgres:5432/${POSTGRES_DB:-stella}
      OLLAMA_GEMMA4_URL: ${OLLAMA_GEMMA4_URL}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      SEARCH_TOP_READ: ${SEARCH_TOP_READ:-3}
      HASHTAG_THRESHOLD_DEFAULT: ${HASHTAG_THRESHOLD_DEFAULT:-3}
      UPLOAD_DIR: /app/backend/uploads
      LOG_DIR: /app/backend/logs
    volumes:
      - attachments-data:/app/backend/uploads
      - logs-data:/app/backend/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stella-net
    healthcheck:
      test: ["CMD-SHELL", "(wget -q --spider http://127.0.0.1:4100/auth/setup-status && wget -q --spider http://127.0.0.1:3100/) || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

networks:
  stella-net:
    driver: bridge

volumes:
  postgres-data:
  attachments-data:
  logs-data:
