format_version: 10

# ──────────────────────────────────────────────────────────────────────────────
# GoCD Pipeline-as-Code 설정
#
# 사전 준비:
#   1. GoCD 서버에서 이 저장소를 "Config Repository"로 등록
#      Admin > Config Repositories > Add
#      Plugin: YAML Configuration Plugin
#      URL: 이 저장소 URL
#
#   2. GoCD 서버 UI에서 아래 Secure Environment Variables 설정
#      Pipeline: stella-chatbot > Settings > Variables (Secure)
#        REGISTRY_USER  — 레지스트리 로그인 사용자명
#        REGISTRY_PASS  — 레지스트리 로그인 비밀번호
#
#   3. GoCD Agent에 'docker' resource 태그 부여
#      Admin > Agents > 해당 Agent > Resources: docker
#
#   4. 자동 트리거 설정 (GitHub Actions webhook 방식)
#      .github/workflows/gocd-trigger.yml 이 git tag push 시 자동으로 이 파이프라인을 호출.
#      GitHub 저장소 Settings > Secrets and variables > Actions 에 아래 두 값 등록:
#        GOCD_SERVER_URL  — GoCD 서버 주소 (예: http://gocd.example.com:8153)
#                           GoCD 서버가 GitHub Actions에서 접근 가능해야 함 (공개 IP 또는 터널)
#        GOCD_API_TOKEN   — GoCD 서버의 API 토큰
#                           GoCD UI > 우상단 프로필 > Personal Access Tokens 에서 생성
# ──────────────────────────────────────────────────────────────────────────────

pipelines:
  stella-chatbot:
    group: stella
    label_template: "${git_repo[:8]}"
    lock_behavior: none

    environment_variables:
      REGISTRY_URL: registry.webnori.com
      IMAGE_NAME: stella-th
      DEPLOY_VERSION: ""

    materials:
      git_repo:
        git: git@github.com:charles96/stella_thread_house.git
        branch: main
        shallow_clone: false

    stages:
      # ── Stage 1: Docker 이미지 빌드 & Registry 푸시 ──────────────────────────
      - build-and-push:
          approval:
            type: success           # 이전 stage 성공 시 자동 진행
          jobs:
            docker-build:
              timeout: 60           # 분 단위
              resources:
                - docker            # docker 가 설치된 agent에서만 실행
              tasks:
                - exec:
                    command: /bin/bash
                    arguments:
                      - scripts/ci-build.sh

      # ── Stage 2: 서버 배포 (추후 추가) ──────────────────────────────────────
      # 배포 방식 확정 후 여기에 deploy stage를 추가한다.
