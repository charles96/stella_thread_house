name: GoCD Build Trigger (on tag push)

# v로 시작하는 git tag가 push될 때만 실행 (예: v1.0.0, v2.1.3)
on:
  push:
    tags:
      - 'v*'

jobs:
  trigger-gocd:
    runs-on: ubuntu-latest
    steps:
      - name: Extract tag name
        id: tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Print trigger info
        run: |
          echo "Tag: ${{ steps.tag.outputs.TAG_NAME }}"
          echo "SHA: ${{ github.sha }}"

      - name: Trigger GoCD pipeline
        env:
          TAG_NAME: ${{ steps.tag.outputs.TAG_NAME }}
          COMMIT_SHA: ${{ github.sha }}
          GOCD_SERVER_URL: ${{ secrets.GOCD_SERVER_URL }}
          GOCD_API_TOKEN: ${{ secrets.GOCD_API_TOKEN }}
        run: |
          AUTH_ARGS=()
          if [ -n "${GOCD_API_TOKEN:-}" ]; then
            AUTH_ARGS=(-H "Authorization: Bearer ${GOCD_API_TOKEN}")
          fi

          # update_materials_before_scheduling: GoCD 가 trigger 직전에 git fetch 하여
          #   방금 push 된 tag/commit 을 받아오게 함 (auto_update: false 와 함께 동작).
          PAYLOAD=$(cat <<JSON
          {
            "environment_variables": [
              { "name": "DEPLOY_VERSION", "value": "${TAG_NAME}", "secure": false }
            ],
            "update_materials_before_scheduling": true
          }
          JSON
          )

          HTTP_STATUS=$(curl -s -o /tmp/gocd_response.json -w "%{http_code}" \
            -X POST "${GOCD_SERVER_URL}/go/api/pipelines/stella-chatbot/schedule" \
            "${AUTH_ARGS[@]}" \
            -H "Accept: application/vnd.go.cd.v1+json" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "GoCD response (HTTP ${HTTP_STATUS}):"
          cat /tmp/gocd_response.json

          if [ "$HTTP_STATUS" != "202" ]; then
            echo "ERROR: GoCD 트리거 실패 (HTTP ${HTTP_STATUS})"
            exit 1
          fi

          echo "✓ GoCD 파이프라인 stella-chatbot 트리거 완료 (tag: ${TAG_NAME})"
